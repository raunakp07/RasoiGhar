<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – RasoiHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="loader-overlay" id="loader">
  <div class="loader-logo"><i class="fa-solid fa-utensils"></i> RasoiHub</div>
  <div class="spinner"></div>
</div>
<nav class="navbar" id="navbar">
  <div class="logo"><i class="fa-solid fa-utensils"></i> RasoiHub</div>
  <div class="nav-links">
    <a href="dashboard.html" class="active">Dashboard</a>
    <a href="bookings.html">Bookings</a>
    <a href="profile.html">Profile</a>
    <a href="#" onclick="doLogout()" class="nav-cta">Logout</a>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">
      <div class="theme-toggle-thumb" id="themeThumb">🌙</div>
    </button>
  </div>
</nav>
<div class="page-wrapper">
  <div class="page-content">
    <div class="dash-welcome">
      <h1>Good <span id="greeting">day</span>, <span id="userName">there</span> 👋</h1>
      <p>Here's an overview of your dining activity on RasoiHub.</p>
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon"><i class="fa-solid fa-calendar-check"></i></div>
        <div class="stat-info"><h4>Total Bookings</h4><div class="stat-value" id="totalBookings">–</div><div class="stat-sub">All reservations</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(192,97,74,0.12);color:var(--terracotta);"><i class="fa-solid fa-users"></i></div>
        <div class="stat-info"><h4>Total Guests</h4><div class="stat-value" id="totalGuests">–</div><div class="stat-sub">Across all bookings</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(100,180,120,0.1);color:#5ccf7a;"><i class="fa-solid fa-clock"></i></div>
        <div class="stat-info"><h4>Upcoming</h4><div class="stat-value" id="upcomingCount">–</div><div class="stat-sub">Future reservations</div></div>
      </div>
    </div>
    <div>
      <div class="flex items-center justify-between mb-24">
        <h2 style="font-size:1.3rem;">Recent Reservations</h2>
        <a href="bookings.html" class="btn-secondary btn-sm">View All <i class="fa-solid fa-arrow-right"></i></a>
      </div>
      <div id="recentList" style="display:flex;flex-direction:column;gap:14px;"></div>
    </div>
  </div>
</div>
<script>
  const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? 'http://localhost:5000/api'
    : '/api';

  function showToast(message, type = 'info', duration = 3500) {
    let container = document.querySelector('.toast-container');
    if (!container) {
      container = document.createElement('div');
      container.className = 'toast-container';
      document.body.appendChild(container);
    }
    const icons = { success: 'fa-circle-check', error: 'fa-circle-xmark', info: 'fa-circle-info' };
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<i class="fa-solid ${icons[type] || icons.info} toast-icon"></i><span class="toast-text">${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
      toast.classList.add('fade-out');
      toast.addEventListener('animationend', () => toast.remove());
    }, duration);
  }

  async function apiCall(endpoint, method = 'GET', body = null) {
    const token = localStorage.getItem('token');
    const options = { method, headers: { 'Content-Type': 'application/json' } };
    if (token) options.headers.Authorization = `Bearer ${token}`;
    if (body) options.body = JSON.stringify(body);
    const res = await fetch(`${API_URL}${endpoint}`, options);
    if (!res.ok) {
      const errorData = await res.json().catch(() => ({}));
      throw new Error(errorData.message || 'API Error');
    }
    return res.json();
  }

  async function requireAuth(callback) {
    const token = localStorage.getItem('token');
    if (!token) {
      window.location.href = 'login.html';
      return;
    }
    try {
      const res = await fetch(`${API_URL}/auth/me`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (!res.ok) throw new Error('Not authorized');
      const user = await res.json();
      if (callback) callback(user);
    } catch (_) {
      localStorage.removeItem('token');
      window.location.href = 'login.html';
    }
  }

  function logout() {
    localStorage.removeItem('token');
    window.location.href = 'login.html';
  }

  function initNavbar() {
    const navbar = document.querySelector('.navbar');
    if (!navbar) return;
    window.addEventListener('scroll', () => navbar.classList.toggle('scrolled', window.scrollY > 20));
  }

  function setActiveNav() {
    const current = window.location.pathname.split('/').pop();
    document.querySelectorAll('.nav-links a').forEach(link => {
      if (link.getAttribute('href') === current) link.classList.add('active');
    });
  }

  function formatDate(dateStr) {
    if (!dateStr) return '-';
    return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
  }

  function formatTime(timeStr) {
    if (!timeStr) return '-';
    const [h, m] = timeStr.split(':');
    const hr = parseInt(h, 10);
    return `${hr % 12 || 12}:${m} ${hr >= 12 ? 'PM' : 'AM'}`;
  }

  function isUpcoming(dateStr) {
    return new Date(dateStr + 'T00:00:00') >= new Date(new Date().toDateString());
  }

  function applyTheme(mode) {
    const thumb = document.getElementById('themeThumb');
    if (mode === 'light') {
      document.body.classList.add('light-mode');
      if (thumb) thumb.textContent = 'SUN';
    } else {
      document.body.classList.remove('light-mode');
      if (thumb) thumb.textContent = 'MOON';
    }
    localStorage.setItem('rasoihub-theme', mode);
  }

  function initTheme() {
    applyTheme(localStorage.getItem('rasoihub-theme') || 'dark');
    window.toggleTheme = function() {
      applyTheme(document.body.classList.contains('light-mode') ? 'dark' : 'light');
    };
  }

  initTheme(); initNavbar(); setActiveNav();
  window.doLogout = logout;
  function getGreeting() { const h = new Date().getHours(); return h<12?'morning':h<17?'afternoon':'evening'; }
  requireAuth(async user => {
    document.getElementById('greeting').textContent = getGreeting();
    document.getElementById('userName').textContent = user.name ? user.name.split(' ')[0] : 'there';
    try {
      const bookings = await apiCall('/bookings', 'GET');
      document.getElementById('totalBookings').textContent = bookings.length;
      document.getElementById('totalGuests').textContent   = bookings.reduce((s,b) => s+(parseInt(b.guests)||0), 0);
      document.getElementById('upcomingCount').textContent = bookings.filter(b => isUpcoming(b.date)).length;
      const listEl = document.getElementById('recentList');
      const recent = bookings.slice(0,5);
      if (recent.length === 0) {
        listEl.innerHTML = `<div class="empty-state"><i class="fa-solid fa-calendar-xmark"></i><h3>No reservations yet</h3><p>Create your first booking.</p><a href="bookings.html" class="btn-primary btn-sm" style="margin-top:20px;display:inline-flex;"><i class="fa-solid fa-plus"></i> Make a Booking</a></div>`;
      } else {
        listEl.innerHTML = recent.map((b,i) => {
          const up = isUpcoming(b.date);
          return `<div class="booking-card" style="animation-delay:${i*0.07}s">
            <div class="booking-info">
              <div class="booking-restaurant">${b.restaurantName || 'RasoiHub'}</div>
              <div class="booking-meta">
                <div class="booking-meta-item"><i class="fa-solid fa-calendar"></i> ${formatDate(b.date)}</div>
                <div class="booking-meta-item"><i class="fa-solid fa-clock"></i> ${formatTime(b.time)}</div>
                <div class="booking-meta-item"><i class="fa-solid fa-users"></i> ${b.guests} guest${b.guests==1?'':'s'}</div>
              </div>
            </div>
            <span class="booking-status ${up?'status-upcoming':'status-past'}">
              <i class="fa-solid ${up?'fa-circle-check':'fa-circle-xmark'}"></i> ${up?'Upcoming':'Past'}
            </span>
          </div>`;
        }).join('');
      }
    } catch(err) { console.error(err); showToast('Error loading dashboard.','error'); }
    const loader = document.getElementById('loader');
    loader.classList.add('hidden');
    setTimeout(() => loader.remove(), 500);
  });
</script>
</body>
</html>
