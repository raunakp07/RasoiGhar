<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password – RasoiHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="auth-theme-toggle">
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">
    <div class="theme-toggle-thumb" id="themeThumb">🌙</div>
  </button>
</div>
<div class="auth-wrapper">
  <div class="auth-box">
    <div class="auth-logo"><i class="fa-solid fa-utensils"></i> RasoiHub</div>
    <h2>Reset Password</h2>
    <p class="auth-subtitle">Enter your email and we'll send a reset link</p>
    <div class="input-group"><i class="fa-solid fa-envelope icon"></i><input type="email" id="resetEmail" placeholder="Email Address"></div>
    <button class="btn-primary w-full mt-8" id="resetBtn" onclick="doReset()">
      <i class="fa-solid fa-paper-plane"></i> Send Reset Link
    </button>
    <p class="auth-footer">Remember your password? <a href="login.html">Sign In</a></p>
  </div>
</div>
<script>
  function showToast(message, type = 'info', duration = 3500) {
    let container = document.querySelector('.toast-container');
    if (!container) {
      container = document.createElement('div');
      container.className = 'toast-container';
      document.body.appendChild(container);
    }
    const icons = { success: 'fa-circle-check', error: 'fa-circle-xmark', info: 'fa-circle-info' };
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<i class="fa-solid ${icons[type] || icons.info} toast-icon"></i><span class="toast-text">${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
      toast.classList.add('fade-out');
      toast.addEventListener('animationend', () => toast.remove());
    }, duration);
  }

  function applyTheme(mode) {
    const thumb = document.getElementById('themeThumb');
    if (mode === 'light') {
      document.body.classList.add('light-mode');
      if (thumb) thumb.textContent = 'SUN';
    } else {
      document.body.classList.remove('light-mode');
      if (thumb) thumb.textContent = 'MOON';
    }
    localStorage.setItem('rasoihub-theme', mode);
  }

  function initTheme() {
    applyTheme(localStorage.getItem('rasoihub-theme') || 'dark');
    window.toggleTheme = function() {
      applyTheme(document.body.classList.contains('light-mode') ? 'dark' : 'light');
    };
  }

  initTheme();
  window.doReset = async function() {
    showToast('Resetting passwords is disabled in this MVP.', 'info');
  };
</script>
</body>
</html>
