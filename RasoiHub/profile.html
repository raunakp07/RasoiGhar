<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile – RasoiHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="loader-overlay" id="loader">
  <div class="loader-logo"><i class="fa-solid fa-utensils"></i> RasoiHub</div>
  <div class="spinner"></div>
</div>
<nav class="navbar" id="navbar">
  <div class="logo"><i class="fa-solid fa-utensils"></i> RasoiHub</div>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="bookings.html">Bookings</a>
    <a href="admin.html" id="adminNavLink" style="display:none;">Admin</a>
    <a href="profile.html" class="active">Profile</a>
    <a href="#" onclick="doLogout()" class="nav-cta">Logout</a>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">
      <div class="theme-toggle-thumb" id="themeThumb">🌙</div>
    </button>
  </div>
</nav>
<div class="page-wrapper">
  <div class="page-header"><h1>My Profile</h1><p>Manage your account information.</p></div>
  <div class="page-content">
    <div class="profile-layout">
      <div class="profile-sidebar">
        <div class="avatar-ring" id="avatarRing">?</div>
        <h3 id="sidebarName">Loading…</h3>
        <p class="email" id="sidebarEmail">–</p>
        <span class="badge"><i class="fa-solid fa-circle" style="font-size:7px"></i> Active Member</span>
        <div style="margin-top:28px;text-align:left;">
          <div class="stat-row"><span>Member Since</span><span id="memberSince">–</span></div>
          <div class="stat-row"><span>Total Bookings</span><span id="sidebarBookings">–</span></div>
          <div class="stat-row"><span>Upcoming</span><span id="sidebarUpcoming">–</span></div>
        </div>
      </div>
      <div>
        <div class="profile-card" style="margin-bottom:24px;">
          <h2>Account Information</h2>
          <div class="input-group no-icon"><label>Full Name</label><input type="text" id="pName" placeholder="Your full name"></div>
          <div class="input-group no-icon"><label>Email Address</label><input type="email" id="pEmail" disabled style="opacity:0.5;cursor:not-allowed;"></div>
          <div class="input-group no-icon"><label>Phone Number</label><input type="tel" id="pPhone" placeholder="Your contact number"></div>
          <p style="color:var(--text-muted);font-size:0.82rem;margin-bottom:20px;"><i class="fa-solid fa-info-circle"></i> Email cannot be changed.</p>
          <button class="btn-primary" id="saveBtn" onclick="doSaveProfile()"><i class="fa-solid fa-floppy-disk"></i> Save Changes</button>
        </div>
        <div class="profile-card" style="margin-bottom:24px;">
          <h2>Change Password</h2>
          <div class="input-group no-icon"><label>Current Password</label><input type="password" id="currentPw" placeholder="Enter current password"></div>
          <div class="input-group no-icon"><label>New Password</label><input type="password" id="newPw" placeholder="Min 6 characters"></div>
          <div class="input-group no-icon"><label>Confirm Password</label><input type="password" id="confirmPw" placeholder="Repeat new password"></div>
          <button class="btn-secondary" id="pwBtn" onclick="doChangePassword()"><i class="fa-solid fa-lock"></i> Update Password</button>
        </div>
        <div class="danger-zone">
          <h3><i class="fa-solid fa-triangle-exclamation"></i> Danger Zone</h3>
          <p>Sign out from RasoiHub on this device.</p>
          <button class="btn-danger" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? 'http://localhost:5000/api'
    : '/api';

  function showToast(message, type = 'info', duration = 3500) {
    let container = document.querySelector('.toast-container');
    if (!container) {
      container = document.createElement('div');
      container.className = 'toast-container';
      document.body.appendChild(container);
    }
    const icons = { success: 'fa-circle-check', error: 'fa-circle-xmark', info: 'fa-circle-info' };
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<i class="fa-solid ${icons[type] || icons.info} toast-icon"></i><span class="toast-text">${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
      toast.classList.add('fade-out');
      toast.addEventListener('animationend', () => toast.remove());
    }, duration);
  }

  async function apiCall(endpoint, method = 'GET', body = null) {
    const token = localStorage.getItem('token');
    const options = { method, headers: { 'Content-Type': 'application/json' } };
    if (token) options.headers.Authorization = `Bearer ${token}`;
    if (body) options.body = JSON.stringify(body);
    const res = await fetch(`${API_URL}${endpoint}`, options);
    if (!res.ok) {
      const errorData = await res.json().catch(() => ({}));
      throw new Error(errorData.message || 'API Error');
    }
    return res.json();
  }

  async function requireAuth(callback) {
    const token = localStorage.getItem('token');
    if (!token) {
      window.location.href = 'login.html';
      return;
    }
    try {
      const res = await fetch(`${API_URL}/auth/me`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (!res.ok) throw new Error('Not authorized');
      const user = await res.json();
      if (callback) callback(user);
    } catch (_) {
      localStorage.removeItem('token');
      window.location.href = 'login.html';
    }
  }

  function logout() {
    localStorage.removeItem('token');
    window.location.href = 'login.html';
  }

  function initNavbar() {
    const navbar = document.querySelector('.navbar');
    if (!navbar) return;
    window.addEventListener('scroll', () => navbar.classList.toggle('scrolled', window.scrollY > 20));
  }

  function setActiveNav() {
    const current = window.location.pathname.split('/').pop();
    document.querySelectorAll('.nav-links a').forEach(link => {
      if (link.getAttribute('href') === current) link.classList.add('active');
    });
  }

  function isUpcoming(dateStr) {
    return new Date(dateStr + 'T00:00:00') >= new Date(new Date().toDateString());
  }

  function applyTheme(mode) {
    const thumb = document.getElementById('themeThumb');
    if (mode === 'light') {
      document.body.classList.add('light-mode');
      if (thumb) thumb.textContent = 'SUN';
    } else {
      document.body.classList.remove('light-mode');
      if (thumb) thumb.textContent = 'MOON';
    }
    localStorage.setItem('rasoihub-theme', mode);
  }

  function initTheme() {
    applyTheme(localStorage.getItem('rasoihub-theme') || 'dark');
    window.toggleTheme = function() {
      applyTheme(document.body.classList.contains('light-mode') ? 'dark' : 'light');
    };
  }

  initTheme(); initNavbar(); setActiveNav();
  window.doLogout = logout;
  let currentUser = null;

  requireAuth(async user => {
    currentUser = user;
    document.getElementById('pName').value  = user.name || '';
    document.getElementById('pEmail').value = user.email || '';
    document.getElementById('pPhone').value = user.phone || '';
    document.getElementById('sidebarEmail').textContent = user.email || '–';
    if (user.role === 'admin') document.getElementById('adminNavLink').style.display = 'inline-flex';
    updateSidebar(user.name || user.email);
    const c = user.createdAt || Date.now();
    if (c) document.getElementById('memberSince').textContent = new Date(c).toLocaleDateString('en-IN',{month:'short',year:'numeric'});
    try {
      const bookings = await apiCall('/bookings', 'GET');
      document.getElementById('sidebarBookings').textContent = bookings.length;
      document.getElementById('sidebarUpcoming').textContent = bookings.filter(b=>isUpcoming(b.date)).length;
    } catch(_) {}
    const loader = document.getElementById('loader');
    loader.classList.add('hidden');
    setTimeout(() => loader.remove(), 500);
  });

  function updateSidebar(name) {
    document.getElementById('sidebarName').textContent = name||'–';
    document.getElementById('avatarRing').textContent = (name||'U').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  }

  window.doSaveProfile = async function() {
    const name = document.getElementById('pName').value.trim();
    const phone = document.getElementById('pPhone').value.trim();
    const btn = document.getElementById('saveBtn');
    if (!name) return showToast('Please enter your name.', 'error');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner" style="width:18px;height:18px;border-width:2px;display:inline-block;"></span> Saving...';
    try {
      const updatedUser = await apiCall('/auth/me', 'PUT', { name, phone });
      currentUser = updatedUser;
      updateSidebar(updatedUser.name || updatedUser.email);
      document.getElementById('pName').value = updatedUser.name || '';
      document.getElementById('pPhone').value = updatedUser.phone || '';
      showToast('Profile updated successfully.', 'success');
    } catch (err) {
      showToast(err.message || 'Could not update profile.', 'error');
    }
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save Changes';
  };

  window.doChangePassword = async function() {
    const currentPassword = document.getElementById('currentPw').value;
    const newPassword = document.getElementById('newPw').value;
    const confirmPassword = document.getElementById('confirmPw').value;
    const btn = document.getElementById('pwBtn');
    if (!currentPassword || !newPassword || !confirmPassword) return showToast('Please fill in all password fields.', 'error');
    if (newPassword.length < 6) return showToast('New password must be at least 6 characters.', 'error');
    if (newPassword !== confirmPassword) return showToast('Passwords do not match.', 'error');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner" style="width:18px;height:18px;border-width:2px;display:inline-block;"></span> Updating...';
    try {
      await apiCall('/auth/password', 'PUT', { currentPassword, newPassword });
      ['currentPw', 'newPw', 'confirmPw'].forEach(id => { document.getElementById(id).value = ''; });
      showToast('Password updated successfully.', 'success');
    } catch (err) {
      showToast(err.message || 'Could not update password.', 'error');
    }
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-lock"></i> Update Password';
  };
</script>
</body>
</html>
